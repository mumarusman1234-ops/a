<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StockTracker — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #07080d;
    --surface: #0e1018;
    --border: #1e2130;
    --accent: #00ff88;
    --accent2: #ff3d6e;
    --accent3: #4da6ff;
    --text: #e8eaf0;
    --muted: #5a5f72;
    --gain: #00ff88;
    --loss: #ff3d6e;
    --card: #10131e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: blobmove 15s ease-in-out infinite alternate;
  }

  @keyframes blobmove {
    from { transform: translate(0, 0); }
    to { transform: translate(400px, 200px); }
  }

  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 0;
    z-index: 100;
  }

  .logo { padding: 0 24px 32px; border-bottom: 1px solid var(--border); }
  .logo-mark { font-size: 22px; font-weight: 800; letter-spacing: -1px; color: var(--text); }
  .logo-mark span { color: var(--accent); }
  .logo-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }
  .nav { padding: 24px 0; flex: 1; }
  
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 24px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    border-left: 2px solid transparent;
    letter-spacing: 0.5px;
    position: relative;
  }

  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.02); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,255,136,0.04); }
  .nav-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
  .nav-icon svg { width: 15px; height: 15px; }

  .market-status { margin: 0 16px; padding: 12px 16px; background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.15); border-radius: 8px; }
  .status-dot { display: inline-block; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(0,255,136,0); }
  }

  .status-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 1.5px; }
  .status-time { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 4px; display: block; }
  .main { margin-left: 220px; min-height: 100vh; position: relative; z-index: 1; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 36px; border-bottom: 1px solid var(--border); background: rgba(7,8,13,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; }
  .page-title { font-size: 18px; font-weight: 700; }
  
  .search-bar { display: flex; align-items: center; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input { background: none; border: none; outline: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 16px; width: 200px; letter-spacing: 1px; text-transform: uppercase; }
  .search-bar input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; }
  
  .search-btn { background: var(--accent); border: none; color: #000; padding: 10px 18px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; transition: background 0.2s; }
  .search-btn:hover { background: #00cc6a; }
  .user-chip { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
  .avatar { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent3)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #000; }
  
  .content { padding: 32px 36px; display: grid; grid-template-columns: 1fr 340px; grid-template-rows: auto auto auto; gap: 24px; }
  .stats-row { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 22px; position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; }
  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.1s; }
  .stat-card:nth-child(3) { animation-delay: 0.15s; }
  .stat-card:nth-child(4) { animation-delay: 0.2s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), transparent); }
  .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--accent3), transparent); }
  .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--gain), transparent); }
  .stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--accent2), transparent); }

  .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
  .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .stat-meta { margin-top: 8px; font-family: 'DM Mono', monospace; font-size: 11px; }

  .gain { color: var(--gain); }
  .loss { color: var(--loss); }

  .chart-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; animation: fadeUp 0.5s ease 0.25s both; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .panel-title { font-size: 16px; font-weight: 700; }
</style>
</head>
<body>

  <div class="sidebar">
    <div class="logo">
      <div class="logo-mark">Stock<span>Tracker</span></div>
      <div class="logo-sub">TERMINAL v1.0</div>
    </div>
    <div class="nav">
      <div class="nav-item active">Dashboard</div>
      <div class="nav-item">Markets</div>
      <div class="nav-item">Watchlist</div>
    </div>
    <div class="market-status">
      <span class="status-dot"></span>
      <span class="status-label">MARKET LIVE</span>
      <span class="status-time">EST Systems OK</span>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="page-title">Market Overview</div>
      <div class="search-bar">
        <input type="text" placeholder="Search Ticker..." />
        <button class="search-btn">GO</button>
      </div>
    </div>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Portfolio Value</div>
          <div class="stat-value">$142,384.10</div>
          <div class="stat-meta gain">+4.2% Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Return</div>
          <div class="stat-value">+$24,890.00</div>
          <div class="stat-meta gain">+21.3% All-Time</div>
        </div>
      </div>
      
      <div class="chart-panel">
        <div class="panel-header">
          <div class="panel-title">Performance Analytics</div>
        </div>
        <p style="color: var(--muted); font-family: 'DM Mono'; font-size: 13px;">Dashboard interface compiled successfully.</p>
      </div>
    </div>
  </div>

</body>
